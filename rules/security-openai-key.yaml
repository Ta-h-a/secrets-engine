id: SEC-011
name: OpenAI API Key
type: security
severity: critical
language: "*"
analyzer: regex
pattern: "(sk-[a-zA-Z0-9]{20}T3BlbkFJ[a-zA-Z0-9]{20}|sk-proj-[a-zA-Z0-9_\\-]{50,})"
message: "OpenAI API key detected"
title: "OpenAI API Key Exposed"
description: "An OpenAI API key was found hardcoded. This key can be used to make API calls at your expense, potentially running up large bills."
redact: true
recommendations:
  - "Revoke the key at platform.openai.com/api-keys"
  - "Generate a new key and store it in a secrets manager"
  - "Set up usage limits and alerts in the OpenAI dashboard"
references:
  - "https://platform.openai.com/docs/guides/safety-best-practices"
tags:
  - openai
  - llm
  - credentials
conditions:
  exclude_paths:
    - "node_modules/"
    - ".git/"
