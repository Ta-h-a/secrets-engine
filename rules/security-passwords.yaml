id: SEC-004
name: Hardcoded Password
type: security
severity: high
language: "*"
analyzer: regex
pattern: "(?i)(password|passwd|pwd)\\s*[=:]\\s*['\"][^'\"]{3,}['\"]"
message: "Hardcoded password detected"
title: "Hardcoded Password"
description: "A hardcoded password was found in source code. This is a critical security risk if the code is committed to version control."
redact: true
recommendations:
  - "Remove the hardcoded password"
  - "Use environment variables or a secrets manager"
  - "Rotate the exposed password immediately"
tags:
  - password
  - credentials
conditions:
  exclude_paths:
    - "node_modules/"
    - ".git/"
    - "test/"
    - "tests/"
    - "spec/"
